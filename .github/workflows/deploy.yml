# Build the Astro site and publish it to Cloudflare Workers.
#
# Requires the CLOUDFLARE_API_TOKEN repository secret (Settings → Secrets and
# variables → Actions). Token permissions: Workers Scripts:Edit, Workers KV
# Storage:Edit, Account Settings:Read, User Details:Read, Memberships:Read,
# Workers Routes:Edit.
#
# Runs automatically on every push to main (production deploy), or on demand
# via workflow_dispatch, which can target production or staging.
name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: Deploy target
        type: choice
        options: [production, staging]
        default: production

concurrency:
  group: deploy-${{ inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Deploy to Cloudflare Workers
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          if [ "${{ inputs.environment || 'production' }}" = "staging" ]; then
            npm run deploy:staging
          else
            npm run deploy
          fi
