# Manual Cloudflare operations for the ipickpickens Worker.
# attach-domains: clears DNS records imported from the old registrar on the
# apex/www names, then attaches both as Worker custom domains via the
# documented PUT /accounts/:id/workers/domains endpoint. Prints no secrets.
name: Diagnose Cloudflare

on: workflow_dispatch

env:
  CF_ACCOUNT: cc05cbfb54bb9dcb3dba0ee9ad98a1bf
  SCRIPT: ipickpickens

jobs:
  attach-domains:
    runs-on: ubuntu-latest
    steps:
      - name: Clear conflicting DNS and attach custom domains
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          auth=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json")
          zone=$(curl -s "${auth[@]}" "https://api.cloudflare.com/client/v4/zones?name=ipickpickens.com" | jq -r '.result[0].id')
          echo "zone id: $zone"
          for host in ipickpickens.com www.ipickpickens.com; do
            echo "== DNS records on $host =="
            recs=$(curl -s "${auth[@]}" "https://api.cloudflare.com/client/v4/zones/$zone/dns_records?name=$host")
            echo "$recs" | jq '[.result[]? | {id, type, content, proxied}]' || true
            for id in $(echo "$recs" | jq -r '.result[]?.id'); do
              echo "-- deleting record $id"
              curl -s -X DELETE "${auth[@]}" "https://api.cloudflare.com/client/v4/zones/$zone/dns_records/$id" | jq '{success, errors}' || true
            done
            echo "== attaching $host =="
            curl -s -X PUT "${auth[@]}" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
              --data "{\"zone_id\":\"$zone\",\"hostname\":\"$host\",\"service\":\"$SCRIPT\",\"environment\":\"production\"}" \
              | jq . || true
          done
          echo "== attached domains for account =="
          curl -s "${auth[@]}" "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains?per_page=50" \
            | jq '[.result[]? | {hostname, service}]' || true
