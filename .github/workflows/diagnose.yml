# Manual Cloudflare operations for the ipickpickens Worker.
# attach-domains: attaches ipickpickens.com + www as Worker custom domains,
# overriding any DNS records imported from the old registrar (the reason a
# plain `wrangler deploy` fails non-interactively). Prints no secrets.
name: Diagnose Cloudflare

on: workflow_dispatch

env:
  CF_ACCOUNT: cc05cbfb54bb9dcb3dba0ee9ad98a1bf
  SCRIPT: ipickpickens

jobs:
  attach-domains:
    runs-on: ubuntu-latest
    steps:
      - name: Attach custom domains (with DNS override)
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          auth=(-H "Authorization: Bearer $CLOUDFLARE_API_TOKEN" -H "Content-Type: application/json")
          zone=$(curl -s "${auth[@]}" "https://api.cloudflare.com/client/v4/zones?name=ipickpickens.com" | jq -r '.result[0].id')
          echo "zone id: $zone"
          for host in ipickpickens.com www.ipickpickens.com; do
            echo "== attaching $host =="
            curl -s -X PUT "${auth[@]}" \
              "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/scripts/$SCRIPT/domains/records" \
              --data "{\"zone_id\":\"$zone\",\"hostname\":\"$host\",\"service\":\"$SCRIPT\",\"environment\":\"production\",\"override_scope\":true,\"override_existing_origin\":true,\"override_existing_dns_record\":true}" \
              | jq '{success, errors, result: (.result | if . then {hostname, service, cert_status} else null end)}'
          done
          echo "== attached domains for account =="
          curl -s "${auth[@]}" "https://api.cloudflare.com/client/v4/accounts/$CF_ACCOUNT/workers/domains" \
            | jq '{success, domains: [.result[]? | {hostname, service}]}'
