<!DOCTYPE html>
<html class="shop-404" lang="en">
<head>
  <meta charset="UTF-8">
  <title>Store unavailable</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="referrer" content="never">
  <link rel="shortcut icon" type="image/x-icon" href="//cdn.shopify.com/shopifycloud/storefront/assets/favicon-418d2057.png">

  <style>
    @font-face {
      font-family: 'Shopify Sans Regular';
      font-display: swap;
      font-style: normal;
      font-weight: 400;
      src: url('https://cdn.shopify.com/s/files/1/0458/4836/3030/files/ShopifySans-Regular.woff2?v=1674610915') format('woff2');
    }

    @font-face {
      font-family: 'Shopify Sans Medium';
      font-display: swap;
      font-style: normal;
      font-weight: 500;
      src: url('https://cdn.shopify.com/s/files/1/0458/4836/3030/files/ShopifySans-Medium.woff2?v=1674610916') format('woff2');
    }

    :root {
      --background: #000f0d;
      --text-primary: #f6f7f6;
      --text-secondary: #b6bbb7;
      --border: rgba(246, 247, 246, 0.22);
      --border-strong: rgba(246, 247, 246, 0.9);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      min-height: 100%;
      margin: 0;
    }

    body {
      background: var(--background);
      color: var(--text-primary);
      font-family: 'Shopify Sans Regular', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      -webkit-font-smoothing: antialiased;
      text-rendering: optimizeLegibility;
    }

    a {
      color: inherit;
    }

    .page {
      min-height: 100vh;
      overflow-x: hidden;
      padding: 64px 16px;
    }

    .hero {
      max-width: 900px;
      margin: 0 auto;
      text-align: center;
    }

    .breadcrumb {
      align-items: center;
      display: inline-flex;
      gap: 8px;
      margin-bottom: 38px;
      color: var(--text-primary);
      font-family: 'Shopify Sans Medium', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 18px;
      line-height: 1;
      text-decoration: none;
    }

    .breadcrumb-arrow {
      font-size: 25px;
      font-weight: 400;
      line-height: 0.8;
      transition: transform 0.2s ease;
    }

    .breadcrumb:hover .breadcrumb-arrow {
      transform: translateX(-4px);
    }

    .headline {
      margin: 0;
      color: var(--text-primary);
      font-family: 'Shopify Sans Regular', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 38px;
      font-weight: 400;
      letter-spacing: -0.045em;
      line-height: 1.08;
      text-wrap: balance;
    }

    .subtitle {
      margin: 18px auto 0;
      max-width: 720px;
      color: var(--text-secondary);
      font-size: clamp(18px, 1.45vw, 22px);
      line-height: 1.45;
      text-wrap: balance;
    }

    .actions {
      align-items: center;
      display: flex;
      flex-direction: column;
      gap: 22px;
      justify-content: center;
      margin-top: 26px;
    }

    .refresh-form {
      margin: 0;
    }

    .button {
      appearance: none;
      align-items: center;
      background: transparent;
      border: 1px solid var(--border-strong);
      border-radius: 999px;
      color: var(--text-primary);
      cursor: pointer;
      display: inline-flex;
      font-family: 'Shopify Sans Medium', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 18px;
      justify-content: center;
      line-height: 1.2;
      max-width: 100%;
      padding: 10px 22px;
      text-decoration: none;
      transition: background 0.2s ease, color 0.2s ease, border-color 0.2s ease;
    }

    .button:hover {
      background: var(--text-primary);
      border-color: var(--text-primary);
      color: var(--background);
    }

    .breadcrumb:focus-visible,
    .button:focus-visible,
    .free-trial-link:focus-visible,
    .did-you-mean-link:focus-visible,
    .link:focus-visible,
    .link-dark:focus-visible {
      outline: 2px solid var(--text-primary);
      outline-offset: 3px;
    }

    .free-trial-link {
      color: var(--text-primary);
      font-family: 'Shopify Sans Medium', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 18px;
      line-height: 1.2;
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 5px;
    }

    .did-you-mean-link {
      text-decoration: underline;
      text-decoration-thickness: 2px;
      text-underline-offset: 5px;
    }

    .support-card,
    .legacy-support-card,
    .legacy-cta-list {
      border: 1px solid var(--border);
      border-radius: 16px;
      margin: 76px auto 0;
      max-width: 1350px;
      padding: 32px;
    }

    .support-card {
      align-items: flex-start;
      display: flex;
      flex-direction: column;
      gap: 32px;
      text-align: left;
    }

    .support-copy {
      max-width: 680px;
    }

    .support-eyebrow,
    .owner-header {
      color: var(--text-primary);
      font-family: 'Shopify Sans Medium', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      letter-spacing: 0.03em;
      line-height: 1.2;
      margin-bottom: 16px;
      text-transform: uppercase;
    }

    .support-heading,
    .cta-header {
      color: var(--text-primary);
      font-size: clamp(30px, 2.6vw, 38px);
      font-weight: 400;
      letter-spacing: -0.045em;
      line-height: 1.15;
      margin: 0;
      text-wrap: balance;
    }

    .support-caption,
    .cta-caption,
    .owner-caption {
      color: var(--text-secondary);
      font-size: 20px;
      line-height: 1.35;
      margin: 10px 0 0;
      text-wrap: balance;
    }

    .legacy-cta-list {
      display: grid;
      gap: 32px;
      grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
      text-align: center;
    }

    .legacy-support-card {
      max-width: 780px;
      text-align: center;
    }

    .cta-link {
      color: var(--text-primary);
      font-family: 'Shopify Sans Medium', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 18px;
      margin-top: 14px;
    }

    .link,
    .link-dark {
      color: var(--text-primary);
      text-decoration: underline;
      text-underline-offset: 4px;
    }

    @media screen and (min-width: 901px) {
      .page {
        padding: 138px 6vw 84px;
      }

      .headline {
        font-size: clamp(44px, 4.15vw, 64px);
        letter-spacing: -0.055em;
        line-height: 1.05;
      }

      .subtitle {
        line-height: 1.4;
      }

      .actions {
        flex-direction: row;
        gap: 36px;
      }

      .button {
        font-size: 20px;
        line-height: 1;
        min-height: 60px;
        padding: 0 28px;
        white-space: nowrap;
      }

      .button--wide {
        min-width: 350px;
      }

      .free-trial-link {
        font-size: 20px;
      }

      .support-card,
      .legacy-support-card,
      .legacy-cta-list {
        margin-top: 130px;
      }

      .support-card {
        align-items: center;
        flex-direction: row;
        gap: 48px;
        justify-content: space-between;
      }
    }

    @media (prefers-reduced-motion: reduce) {
      .breadcrumb-arrow,
      .button {
        transition: none;
      }

      .breadcrumb:hover .breadcrumb-arrow {
        transform: none;
      }
    }
  </style>
<meta name="shopify-y" content="00000000-0000-0000-0000-000000000000"></head>

<body>
  <main class="page">
    <section class="hero" aria-labelledby="hero-text">
      <a class="breadcrumb" href="https://www.shopify.com/?utm_source=ExpiredDomainLink&utm_medium=textlink&utm_campaign=breadcrumb">
        <span class="breadcrumb-arrow" aria-hidden="true">←</span>
        <span>Shopify</span>
      </a>

      <div id="shop-not-found">
        <h1 class="headline" id="hero-text">This store is currently unavailable.</h1>
      </div>

      <div id="did-you-mean-msg" style="display: none;">
        <h1 class="headline">
          Did you mean <a class="did-you-mean-link" id="did-you-mean-link"></a>?
        </h1>
      </div>

      <script type="text/javascript" nonce="auVDO613E3B5QfEQaa/4QOgZvZrB39doFyVmVb93s64=">
        (function() {
          var hostname = window.location.hostname;
          var re = /\.(shopify|shopifyadmin)\.com$/;

          if (hostname == 'checkout.shopify.com' || hostname == 'app.shopify.com' || !hostname.match(re)) {
            return;
          }

          var didYouMeanLink = document.getElementById('did-you-mean-link');
          var didYouMeanMessage = document.getElementById('did-you-mean-msg');
          var shopNotFoundMessage = document.getElementById('shop-not-found');

          if (!didYouMeanLink || !didYouMeanMessage || !shopNotFoundMessage) {
            return;
          }

          var myshopifyDomain = encodeURI(hostname.replace(re, '.myshopify.com'));
          var href = encodeURI(window.location.href.replace(hostname, myshopifyDomain));

          didYouMeanLink.setAttribute('href', href);
          didYouMeanLink.textContent = myshopifyDomain;
          shopNotFoundMessage.style.display = 'none';
          didYouMeanMessage.style.display = 'block';
        })();
      </script>

    </section>

      <section class="legacy-cta-list">
          <article class="cta">
            <h2 class="cta-header">Are you the store owner?</h2>
            <div class="cta-caption">Are you having trouble getting into your store? Try the <a class="link" target="_blank" href="https://accounts.shopify.com/recovery/stores?utm_source=gurucopy&utm_medium=link&utm_campaign=Gurus">forgot your store</a> feature. If you would like to reactivate your store contact <a class="link" target="_blank" href="https://help.shopify.com">Shopify support</a>.</div>
          </article>
      </section>
  </main>
</body>
</html>
