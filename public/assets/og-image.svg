  <text x="600" y="432" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="31" letter-spacing="11" fill="#2e2418">BOTANICAL NUTRITION FOR DOGS</text>
  <text x="600" y="540" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="25" letter-spacing="2" fill="#96612f">by Botanical Enlightenment</text>
</svg>
