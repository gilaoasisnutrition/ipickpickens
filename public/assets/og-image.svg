  </g>
  <text x="600" y="170" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="26" letter-spacing="9" fill="#96612f">FROM THE HERBALIST&#8217;S PRESS</text>
  <text x="600" y="318" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-size="118" letter-spacing="4" fill="#2e2418">BE Canine</text>
