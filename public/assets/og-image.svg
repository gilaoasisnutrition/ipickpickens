<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <title>BE Canine — Botanical Nutrition for Dogs</title>
  <desc>Old title-page style social card on parchment with a double-rule border and an engraved sprig ornament.</desc>
  <rect width="1200" height="630" fill="#f4edda"/>
  <rect x="30" y="30" width="1140" height="570" fill="none" stroke="#2e2418" stroke-width="2.5"/>
  <rect x="42" y="42" width="1116" height="546" fill="none" stroke="#2e2418" stroke-width="1"/>
  <!-- corner ticks, engraver's flourish -->
