<svg xmlns="http://www.w3.org/2000/svg" width="600" height="600" viewBox="0 0 600 600">
  <title>Plate IV — Chamomile flowers on stems</title>
  <defs>
    <path id="cp" d="M0 -13Q5 -28 0 -42Q-5 -28 0 -13Z"/>
    <g id="cf">
      <use href="#cp"/><use href="#cp" transform="rotate(30)"/><use href="#cp" transform="rotate(60)"/>
      <use href="#cp" transform="rotate(90)"/><use href="#cp" transform="rotate(120)"/><use href="#cp" transform="rotate(150)"/>
      <use href="#cp" transform="rotate(180)"/><use href="#cp" transform="rotate(210)"/><use href="#cp" transform="rotate(240)"/>
      <use href="#cp" transform="rotate(270)"/><use href="#cp" transform="rotate(300)"/><use href="#cp" transform="rotate(330)"/>
      <circle r="12"/>
      <g fill="#2e2418" stroke="none">
        <circle r="1.4"/><circle cx="5" cy="3" r="1.2"/><circle cx="-5" cy="3" r="1.2"/><circle cx="0" cy="-6" r="1.2"/>
        <circle cx="6" cy="-3" r="1.1"/><circle cx="-6" cy="-3" r="1.1"/><circle cx="0" cy="6" r="1.2"/>
      </g>
    </g>
    <g id="fern">
      <path d="M0 0Q-12 -4 -18 -14M0 0Q-14 2 -24 -2M0 0Q-10 8 -20 12M0 0Q-4 -12 -2 -20"/>
    </g>
  </defs>
  <circle cx="300" cy="300" r="272" fill="#f4edda" opacity="0.45"/>
  <circle cx="300" cy="300" r="272" fill="none" stroke="#2e2418" stroke-width="2"/>
  <circle cx="300" cy="300" r="262" fill="none" stroke="#2e2418" stroke-width="1"/>
  <g stroke="#2e2418" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <!-- stems -->
    <g stroke-width="1.8">
      <path d="M245 230C252 300 275 390 298 466"/>
      <path d="M365 190C358 275 332 385 303 466"/>
      <path d="M415 313C405 372 352 432 306 466"/>
      <path d="M322 264C316 330 306 400 301 466"/>
    </g>
    <!-- feathery leaves -->
    <g stroke-width="1" opacity="0.9">
      <use href="#fern" transform="translate(262 320) rotate(-10)"/>
      <use href="#fern" transform="translate(285 400) rotate(15)"/>
      <use href="#fern" transform="translate(344 300) scale(-1 1) rotate(-5)"/>
      <use href="#fern" transform="translate(388 352) scale(-1 1) rotate(12)"/>
      <use href="#fern" transform="translate(314 372) scale(-1 1) rotate(20)"/>
    </g>
    <!-- flowers -->
    <g stroke-width="1.4">
      <use href="#cf" transform="translate(245 215) rotate(-8)"/>
      <use href="#cf" transform="translate(365 175) rotate(14) scale(0.85)"/>
    </g>
    <!-- side-view flower -->
    <g stroke-width="1.4">
      <path d="M396 302C400 288 409 280 416 280C424 280 432 290 434 302Q415 310 396 302Z"/>
      <path d="M398 305q-8 10-6 22M408 307q-4 11-2 22M420 307q2 11 0 22M430 305q7 10 6 20" stroke-width="1.2"/>
      <path d="M402 288q3 6 8 8M424 286q-2 6-7 9" stroke-width="0.9" opacity="0.7"/>
    </g>
    <!-- bud -->
    <circle cx="321" cy="258" r="6.5" stroke-width="1.4"/>
    <path d="M316 263l-5 4M326 263l5 4M321 265v6" stroke-width="1.1"/>
  </g>
  <text x="576" y="580" text-anchor="end" font-family="Georgia, 'Times New Roman', serif" font-size="20" letter-spacing="3" fill="#2e2418">PL. IV</text>
</svg>
