      <circle cx="297" cy="188" r="8"/>
      <circle cx="324" cy="176" r="8" fill="#2e2418"/>
      <circle cx="351" cy="184" r="8"/>
      <circle cx="380" cy="201" r="8" fill="#2e2418"/>
      <circle cx="401" cy="226" r="8"/>
