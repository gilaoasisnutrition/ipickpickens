      <use href="#fl" transform="translate(271 362) rotate(-24)"/>
      <use href="#fl" transform="translate(281 304) rotate(14)"/>
      <use href="#fl" transform="translate(296 254) rotate(-20)"/>
      <use href="#fl" transform="translate(302 410) rotate(-14)"/>
      <use href="#fl" transform="translate(305 340) rotate(18)"/>
      <use href="#fl" transform="translate(317 272) rotate(-18)"/>
      <use href="#fl" transform="translate(327 430) rotate(22)"/>
      <use href="#fl" transform="translate(341 370) rotate(-16)"/>
      <use href="#fl" transform="translate(356 316) rotate(16)"/>
    </g>
    <!-- seed bolls -->
    <g stroke-width="1.8">
      <circle cx="313" cy="192" r="15"/>
      <path d="M313 177v-9M306 180l-5-7M320 180l5-7" stroke-width="1.2"/>
      <path d="M313 177q-6 14 0 30M313 177q6 14 0 30" stroke-width="1"/>
      <circle cx="332" cy="223" r="13.5"/>
